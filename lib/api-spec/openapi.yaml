openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: articles
    description: Public published articles
  - name: case-studies
    description: Company case studies
  - name: drafts
    description: Editorial draft review queue and external draft submission
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /articles:
    get:
      operationId: listArticles
      tags: [articles]
      summary: List published articles
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ArticleSummary"
  /articles/{slug}:
    get:
      operationId: getArticle
      tags: [articles]
      summary: Get a published article by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Article detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /case-studies:
    get:
      operationId: listCaseStudies
      tags: [case-studies]
      summary: List company case studies
      responses:
        "200":
          description: List of case studies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CaseStudySummary"
  /case-studies/{slug}:
    get:
      operationId: getCaseStudy
      tags: [case-studies]
      summary: Get a case study by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Case study detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseStudyDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /drafts/submit:
    post:
      operationId: submitDraft
      tags: [drafts]
      summary: Submit an article draft from an external tool
      description: >
        Accepts an article draft from an external tool (e.g. a CI pipeline or
        content agent) and stores it as a pending draft. Requires an API key
        in the X-API-Key header (set DRAFTS_API_KEY secret).
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitDraftRequest"
      responses:
        "201":
          description: Draft created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /drafts/generate:
    post:
      operationId: generateDraft
      tags: [drafts]
      summary: Generate an article draft with AI
      description: >
        Generates an article draft from a topic or prompt using AI and saves
        it to the review queue as a pending-review draft. Requires an API key
        in the X-API-Key header. Rate limited per client; repeated rapid calls
        get a 429 response.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateDraftRequest"
      responses:
        "201":
          description: AI-generated draft created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Too many requests — rate limit exceeded
          headers:
            Retry-After:
              description: Seconds to wait before retrying
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: AI generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /drafts:
    get:
      operationId: listDrafts
      tags: [drafts]
      summary: List all articles for the editorial queue, optionally filtered by status
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, approved, published, rejected]
      responses:
        "200":
          description: Articles for review
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Article"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    post:
      operationId: createDraft
      tags: [drafts]
      summary: Create a new draft in the review queue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArticleInput"
      responses:
        "201":
          description: Created draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /drafts/summary:
    get:
      operationId: getDraftsSummary
      tags: [drafts]
      summary: Counts of articles by status for the dashboard
      responses:
        "200":
          description: Status counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DraftsSummary"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /drafts/{id}:
    get:
      operationId: getDraft
      tags: [drafts]
      summary: Get a single article for editing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    patch:
      operationId: updateDraft
      tags: [drafts]
      summary: Edit a draft's title, body, category, excerpt, or image
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArticleUpdate"
      responses:
        "200":
          description: Updated article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    delete:
      operationId: deleteDraft
      tags: [drafts]
      summary: Delete an article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /drafts/{id}/approve:
    post:
      operationId: approveDraft
      tags: [drafts]
      summary: Approve a draft — publishes immediately or schedules for a future time
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalOptions"
      responses:
        "200":
          description: Approved article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /drafts/{id}/reject:
    post:
      operationId: rejectDraft
      tags: [drafts]
      summary: Reject a draft with an optional reason
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectionOptions"
      responses:
        "200":
          description: Rejected article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /drafts/{id}/publish:
    post:
      operationId: publishDraft
      tags: [drafts]
      summary: Publish an approved or scheduled article immediately
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Published article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /drafts/{id}/unpublish:
    post:
      operationId: unpublishDraft
      tags: [drafts]
      summary: Move a published or rejected article back to pending review
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Article moved back to pending
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    ErrorMessage:
      type: object
      required: [error]
      properties:
        error:
          type: string
    SubmitDraftRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 300
        body:
          type: string
          minLength: 1
        category:
          type: string
          maxLength: 100
        sourceMetadata:
          type: object
          description: Arbitrary metadata about where the draft came from (repo, run id, model, etc.)
          additionalProperties: true
      required:
        - title
        - body
    GenerateDraftRequest:
      type: object
      properties:
        topic:
          type: string
          minLength: 1
          maxLength: 500
          description: The topic or prompt to write an article about
        category:
          type: string
          maxLength: 100
        instructions:
          type: string
          maxLength: 2000
          description: Optional extra instructions for tone, angle, or length
      required:
        - topic
    ArticleSummary:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        title:
          type: string
        dek:
          type: string
        category:
          type: string
        author:
          type: string
        readingMinutes:
          type: integer
        publishedAt:
          type: string
          format: date-time
        heroImageUrl:
          type: string
          nullable: true
      required:
        - id
        - slug
        - title
        - dek
        - category
        - author
        - readingMinutes
        - publishedAt
    ArticleDetail:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        title:
          type: string
        dek:
          type: string
        body:
          type: string
        category:
          type: string
        author:
          type: string
        readingMinutes:
          type: integer
        publishedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        heroImageUrl:
          type: string
          nullable: true
        sourceUrls:
          type: array
          nullable: true
          items:
            type: string
      required:
        - id
        - slug
        - title
        - dek
        - body
        - category
        - author
        - readingMinutes
        - publishedAt
        - updatedAt
    CaseStudyCompany:
      type: object
      properties:
        name:
          type: string
        website:
          type: string
        industry:
          type: string
        size:
          type: string
        headquarters:
          type: string
        summary:
          type: string
      required:
        - name
        - website
        - industry
        - size
        - headquarters
        - summary
    CaseStudyMetric:
      type: object
      properties:
        label:
          type: string
        value:
          type: string
        context:
          type: string
      required:
        - label
        - value
        - context
    CaseStudyQuote:
      type: object
      properties:
        quote:
          type: string
        attribution:
          type: string
        role:
          type: string
      required:
        - quote
        - attribution
        - role
    CaseStudySummary:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        title:
          type: string
        dek:
          type: string
        author:
          type: string
        readingMinutes:
          type: integer
        publishedAt:
          type: string
          format: date-time
        company:
          $ref: "#/components/schemas/CaseStudyCompany"
        metrics:
          type: array
          items:
            $ref: "#/components/schemas/CaseStudyMetric"
      required:
        - id
        - slug
        - title
        - dek
        - author
        - readingMinutes
        - publishedAt
        - company
        - metrics
    CaseStudyDetail:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        title:
          type: string
        dek:
          type: string
        body:
          type: string
        author:
          type: string
        readingMinutes:
          type: integer
        publishedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        company:
          $ref: "#/components/schemas/CaseStudyCompany"
        metrics:
          type: array
          items:
            $ref: "#/components/schemas/CaseStudyMetric"
        quotes:
          type: array
          items:
            $ref: "#/components/schemas/CaseStudyQuote"
        relatedArticles:
          type: array
          items:
            $ref: "#/components/schemas/ArticleSummary"
      required:
        - id
        - slug
        - title
        - dek
        - body
        - author
        - readingMinutes
        - publishedAt
        - updatedAt
        - company
        - metrics
        - quotes
        - relatedArticles
    Article:
      type: object
      required:
        [
          id,
          title,
          slug,
          body,
          category,
          status,
          source,
          excerpt,
          imageUrl,
          scheduledFor,
          publishedAt,
          rejectionReason,
          sourceMetadata,
          createdAt,
          updatedAt,
        ]
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        excerpt:
          type: ["string", "null"]
        body:
          type: string
        category:
          type: string
        imageUrl:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, approved, published, rejected]
        source:
          type: string
          description: Where the draft came from (manual, api, ai)
        sourceMetadata:
          type: ["object", "null"]
          description: Arbitrary metadata about where the draft came from (repo, run id, model, etc.)
          additionalProperties: true
        scheduledFor:
          type: ["string", "null"]
          format: date-time
        publishedAt:
          type: ["string", "null"]
          format: date-time
        rejectionReason:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ArticleInput:
      type: object
      required: [title, body, category]
      properties:
        title:
          type: string
          minLength: 1
        body:
          type: string
          minLength: 1
        category:
          type: string
          minLength: 1
        excerpt:
          type: string
        imageUrl:
          type: string
    ArticleUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        body:
          type: string
          minLength: 1
        category:
          type: string
          minLength: 1
        excerpt:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
    ApprovalOptions:
      type: object
      properties:
        scheduledFor:
          type: ["string", "null"]
          format: date-time
          description: If set to a future time, the article is scheduled; if omitted or past, it publishes immediately.
    RejectionOptions:
      type: object
      properties:
        reason:
          type: string
    DraftsSummary:
      type: object
      required: [pending, approved, published, rejected, total]
      properties:
        pending:
          type: integer
        approved:
          type: integer
        published:
          type: integer
        rejected:
          type: integer
        total:
          type: integer
