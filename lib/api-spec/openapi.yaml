openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: articles
    description: Public published articles
  - name: case-studies
    description: Company case studies
  - name: drafts
    description: Editorial draft review queue and external draft submission
  - name: seo
    description: SEO administration (audit, search-engine submission, index coverage)
  - name: engine
    description: Research and content generation engine (voice, research, ideation, copywriting, repurposing, SEO)
  - name: analytics
    description: First-party traffic analytics — page views per article, daily series, referrer breakdown
  - name: spotlights
    description: Company and product spotlight articles
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /articles:
    get:
      operationId: listArticles
      tags: [articles]
      summary: List published articles
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: q
          in: query
          required: false
          description: Full-text search query matched against title and dek
          schema:
            type: string
      responses:
        "200":
          description: List of articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ArticleSummary"
  /articles/{slug}:
    get:
      operationId: getArticle
      tags: [articles]
      summary: Get a published article by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Article detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /case-studies:
    get:
      operationId: listCaseStudies
      tags: [case-studies]
      summary: List company case studies
      responses:
        "200":
          description: List of case studies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CaseStudySummary"
  /case-studies/{slug}:
    get:
      operationId: getCaseStudy
      tags: [case-studies]
      summary: Get a case study by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Case study detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseStudyDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /spotlights:
    get:
      operationId: listSpotlights
      tags: [spotlights]
      summary: List all published spotlight articles
      responses:
        "200":
          description: List of spotlights
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SpotlightSummary"
  /spotlights/{slug}:
    get:
      operationId: getSpotlight
      tags: [spotlights]
      summary: Get a spotlight by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Spotlight detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpotlightDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /spotlights/import-url:
    post:
      operationId: importSpotlightUrl
      tags: [spotlights]
      summary: Scrape a company URL and return pre-filled spotlight metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpotlightImportRequest"
      responses:
        "200":
          description: Pre-filled spotlight metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpotlightImportResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /drafts/{id}/spotlight:
    get:
      operationId: getDraftSpotlight
      tags: [spotlights]
      summary: Get spotlight metadata for a draft article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Spotlight editor data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpotlightEditorData"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Draft not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    put:
      operationId: upsertDraftSpotlight
      tags: [spotlights]
      summary: Save spotlight metadata for a draft article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpotlightEditorInput"
      responses:
        "200":
          description: Saved spotlight metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpotlightEditorData"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Draft not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /drafts/submit:
    post:
      operationId: submitDraft
      tags: [drafts]
      summary: Submit an article draft from an external tool
      description: >
        Accepts an article draft from an external tool (e.g. a CI pipeline or
        content agent) and stores it as a pending draft. Requires an API key
        in the X-API-Key header (set DRAFTS_API_KEY secret).
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitDraftRequest"
      responses:
        "201":
          description: Draft created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /drafts/generate:
    post:
      operationId: generateDraft
      tags: [drafts]
      summary: Generate an article draft with AI
      description: >
        Generates an article draft from a topic or prompt using AI and saves
        it to the review queue as a pending-review draft. Requires an API key
        in the X-API-Key header. Rate limited per client; repeated rapid calls
        get a 429 response.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateDraftRequest"
      responses:
        "201":
          description: AI-generated draft created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Too many requests — rate limit exceeded
          headers:
            Retry-After:
              description: Seconds to wait before retrying
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: AI generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /drafts:
    get:
      operationId: listDrafts
      tags: [drafts]
      summary: List all articles for the editorial queue, optionally filtered by status
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, approved, published, rejected]
      responses:
        "200":
          description: Articles for review
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Article"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    post:
      operationId: createDraft
      tags: [drafts]
      summary: Create a new draft in the review queue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArticleInput"
      responses:
        "201":
          description: Created draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /drafts/summary:
    get:
      operationId: getDraftsSummary
      tags: [drafts]
      summary: Counts of articles by status for the dashboard
      responses:
        "200":
          description: Status counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DraftsSummary"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /drafts/{id}:
    get:
      operationId: getDraft
      tags: [drafts]
      summary: Get a single article for editing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    patch:
      operationId: updateDraft
      tags: [drafts]
      summary: Edit a draft's title, body, category, dek, or image
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArticleUpdate"
      responses:
        "200":
          description: Updated article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    delete:
      operationId: deleteDraft
      tags: [drafts]
      summary: Delete an article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /drafts/{id}/approve:
    post:
      operationId: approveDraft
      tags: [drafts]
      summary: Approve a draft — publishes immediately or schedules for a future time
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalOptions"
      responses:
        "200":
          description: Approved article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /drafts/{id}/reject:
    post:
      operationId: rejectDraft
      tags: [drafts]
      summary: Reject a draft with an optional reason
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectionOptions"
      responses:
        "200":
          description: Rejected article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /drafts/{id}/publish:
    post:
      operationId: publishDraft
      tags: [drafts]
      summary: Publish an approved or scheduled article immediately
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Published article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /drafts/{id}/unpublish:
    post:
      operationId: unpublishDraft
      tags: [drafts]
      summary: Move a published or rejected article back to pending review
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Article moved back to pending
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /drafts/{id}/case-study:
    get:
      operationId: getDraftCaseStudy
      tags: [drafts]
      summary: Get case-study metadata (company, metrics, quotes) for an article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Case-study metadata, or null fields if none exists yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseStudyEditorData"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Article not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    put:
      operationId: upsertDraftCaseStudy
      tags: [drafts]
      summary: Create or update case-study metadata for an article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaseStudyEditorInput"
      responses:
        "200":
          description: Saved case-study metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseStudyEditorData"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Article not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /seo/admin/audit:
    get:
      operationId: getSeoAudit
      tags: [seo]
      summary: Audit published content for missing SEO fields
      responses:
        "200":
          description: Audit report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeoAuditReport"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /seo/admin/audit/autofill:
    post:
      operationId: autofillSeoAudit
      tags: [seo]
      summary: Fill blank SEO title/description fields with audit suggestions
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SeoAutofillRequest"
      responses:
        "200":
          description: Autofill result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeoAutofillResult"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /seo/admin/submit:
    post:
      operationId: submitSeoUrls
      tags: [seo]
      summary: Submit URLs to search engines (IndexNow, Google, Bing)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SeoSubmitRequest"
      responses:
        "200":
          description: Per-channel submission results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeoSubmitBundle"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /seo/admin/submissions:
    get:
      operationId: listSeoSubmissions
      tags: [seo]
      summary: Recent search-engine submission ledger rows
      responses:
        "200":
          description: Submission ledger rows (most recent first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SeoSubmissionRow"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /seo/admin/coverage:
    get:
      operationId: getSeoCoverage
      tags: [seo]
      summary: Index-coverage overview grouped by page kind
      responses:
        "200":
          description: Coverage overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeoCoverageOverview"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /seo/admin/coverage/urls:
    get:
      operationId: listSeoCoverageUrls
      tags: [seo]
      summary: Per-URL index-coverage rows
      parameters:
        - name: kind
          in: query
          required: false
          schema:
            type: string
        - name: bucket
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Coverage rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SeoCoverageUrlRow"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /seo/admin/coverage/scan:
    post:
      operationId: runSeoCoverageScan
      tags: [seo]
      summary: Trigger a manual index-coverage rescan
      responses:
        "200":
          description: Scan result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeoScanResult"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /voice:
    get:
      operationId: getBrandVoice
      tags: [engine]
      summary: Get the publication's brand voice profile
      responses:
        "200":
          description: Brand voice profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandVoice"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    put:
      operationId: updateBrandVoice
      tags: [engine]
      summary: Update the publication's brand voice profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrandVoiceInput"
      responses:
        "200":
          description: Updated brand voice profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandVoice"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /grounding-documents:
    get:
      operationId: listGroundingDocuments
      tags: [engine]
      summary: List grounding documents that steer AI generation
      responses:
        "200":
          description: Grounding documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GroundingDocument"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    post:
      operationId: createGroundingDocument
      tags: [engine]
      summary: Add a grounding document (pasted text)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroundingDocumentInput"
      responses:
        "201":
          description: Created grounding document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroundingDocument"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /grounding-documents/{id}:
    delete:
      operationId: deleteGroundingDocument
      tags: [engine]
      summary: Delete a grounding document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /research:
    post:
      operationId: startResearch
      tags: [engine]
      summary: Start an async research job (crawl + news scan + AI briefing)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResearchRequest"
      responses:
        "202":
          description: Research job accepted; poll GET /jobs/{id}
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngineJob"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /research/briefings:
    get:
      operationId: listBriefings
      tags: [engine]
      summary: List completed research briefings
      responses:
        "200":
          description: Research briefings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResearchBriefing"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
  /research/briefings/{id}:
    get:
      operationId: getBriefing
      tags: [engine]
      summary: Get a research briefing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
