      description: Aggregate view counts, daily series, and top articles for the given time window.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: days
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 365
            default: 30
