components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    ErrorMessage:
      type: object
      required: [error]
      properties:
        error:
          type: string
    ExpandBriefRequest:
      type: object
      required: [brief]
      properties:
        brief:
          type: string
          minLength: 1
          description: Raw notes, bullet points, or a partial story brief to expand into a full article
        category:
          type: string
          description: Optional preferred category (e.g. "Industry News"). AI will suggest one if omitted.
    ExpandedArticle:
      type: object
      required: [title, body, category]
      properties:
        title:
          type: string
          description: Suggested article headline
        dek:
          type: string
          description: 1-2 sentence deck / sub-headline
        body:
          type: string
          description: Full article body in Markdown
        category:
          type: string
          description: Suggested category
        sourceUrls:
          type: array
          items:
            type: string
          description: Source URLs extracted from the brief
    SubmitDraftRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 300
        body:
          type: string
          minLength: 1
        category:
          type: string
          maxLength: 100
        sourceMetadata:
          type: object
          description: Arbitrary metadata about where the draft came from (repo, run id, model, etc.)
          additionalProperties: true
      required:
        - title
        - body
    GenerateDraftRequest:
      type: object
      properties:
        topic:
          type: string
          minLength: 1
          maxLength: 500
          description: The topic or prompt to write an article about
        category:
          type: string
          maxLength: 100
        instructions:
          type: string
          maxLength: 2000
          description: Optional extra instructions for tone, angle, or length
      required:
        - topic
    ArticleSummary:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        title:
          type: string
        dek:
          type: string
          nullable: true
        category:
          type: string
        author:
          type: string
        readingMinutes:
          type: integer
        publishedAt:
          type: string
          format: date-time
        heroImageUrl:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        spotlightLogoUrl:
          type: string
          nullable: true
          description: Company logo URL for spotlight articles; null for all other categories
      required:
        - id
        - slug
        - title
        - category
        - author
        - readingMinutes
        - publishedAt
    AuthorProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        bio:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        twitterHandle:
          type: string
          nullable: true
        linkedInUrl:
          type: string
          nullable: true
        isStaff:
          type: boolean
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - slug
        - isStaff
        - isActive
        - createdAt
    ArticleDetail:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        title:
          type: string
        dek:
          type: string
        body:
          type: string
        category:
          type: string
        author:
          type: string
        authorProfile:
          $ref: "#/components/schemas/AuthorProfile"
          nullable: true
        readingMinutes:
          type: integer
        publishedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        heroImageUrl:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        sourceUrls:
          type: array
          nullable: true
          items:
            type: string
      required:
        - id
        - slug
        - title
        - dek
        - body
        - category
        - author
        - readingMinutes
        - publishedAt
        - updatedAt
    CaseStudyCompany:
