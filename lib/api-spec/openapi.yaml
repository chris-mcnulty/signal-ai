openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: articles
    description: Published articles
  - name: case-studies
    description: Company case studies
  - name: drafts
    description: Article draft submission and AI drafting
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /articles:
    get:
      operationId: listArticles
      tags: [articles]
      summary: List published articles
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ArticleSummary"
  /articles/{slug}:
    get:
      operationId: getArticle
      tags: [articles]
      summary: Get a published article by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Article detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /case-studies:
    get:
      operationId: listCaseStudies
      tags: [case-studies]
      summary: List company case studies
      responses:
        "200":
          description: List of case studies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CaseStudySummary"
  /case-studies/{slug}:
    get:
      operationId: getCaseStudy
      tags: [case-studies]
      summary: Get a case study by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Case study detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseStudyDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /drafts:
    post:
      operationId: submitDraft
      tags: [drafts]
      summary: Submit an article draft
      description: >
        Accepts an article draft from an external tool and stores it as a
        pending-review draft. Requires an API key in the X-API-Key header.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitDraftRequest"
      responses:
        "201":
          description: Draft created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Draft"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    get:
      operationId: listDrafts
      tags: [drafts]
      summary: List drafts
      description: >
        Lists drafts, newest first. Optionally filter by status. Requires an
        API key in the X-API-Key header.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending_review, approved, rejected]
      responses:
        "200":
          description: List of drafts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Draft"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /drafts/generate:
    post:
      operationId: generateDraft
      tags: [drafts]
      summary: Generate an article draft with AI
      description: >
        Generates an article draft from a topic or prompt using AI and saves
        it to the review queue as a pending-review draft. Requires an API key
        in the X-API-Key header. Rate limited per client; repeated rapid calls
        get a 429 response.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateDraftRequest"
      responses:
        "201":
          description: AI-generated draft created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Draft"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Too many requests — rate limit exceeded
          headers:
            Retry-After:
              description: Seconds to wait before retrying
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: AI generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    SubmitDraftRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 300
        body:
          type: string
          minLength: 1
        category:
          type: string
          maxLength: 100
        sourceMetadata:
          type: object
          description: Arbitrary metadata about where the draft came from (repo, run id, model, etc.)
          additionalProperties: true
      required:
        - title
        - body
    GenerateDraftRequest:
      type: object
      properties:
        topic:
          type: string
          minLength: 1
          maxLength: 500
          description: The topic or prompt to write an article about
        category:
          type: string
          maxLength: 100
        instructions:
          type: string
          maxLength: 2000
          description: Optional extra instructions for tone, angle, or length
      required:
        - topic
    Draft:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        body:
          type: string
        category:
          type:
            - string
            - "null"
        status:
          type: string
        source:
          type: string
        sourceMetadata:
          type:
            - object
            - "null"
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - body
        - category
        - status
        - source
        - sourceMetadata
        - createdAt
        - updatedAt
    ArticleSummary:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        title:
          type: string
        dek:
          type: string
        category:
          type: string
        author:
          type: string
        readingMinutes:
          type: integer
        publishedAt:
          type: string
          format: date-time
        heroImageUrl:
          type: string
          nullable: true
      required:
        - id
        - slug
        - title
        - dek
        - category
        - author
        - readingMinutes
        - publishedAt
    ArticleDetail:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        title:
          type: string
        dek:
          type: string
        body:
          type: string
        category:
          type: string
        author:
          type: string
        readingMinutes:
          type: integer
        publishedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        heroImageUrl:
          type: string
          nullable: true
        sourceUrls:
          type: array
          nullable: true
          items:
            type: string
      required:
        - id
        - slug
        - title
        - dek
        - body
        - category
        - author
        - readingMinutes
        - publishedAt
        - updatedAt
    CaseStudyCompany:
      type: object
      properties:
        name:
          type: string
        website:
          type: string
        industry:
          type: string
        size:
          type: string
        headquarters:
          type: string
        summary:
          type: string
      required:
        - name
        - website
        - industry
        - size
        - headquarters
        - summary
    CaseStudyMetric:
      type: object
      properties:
        label:
          type: string
        value:
          type: string
        context:
          type: string
      required:
        - label
        - value
        - context
    CaseStudyQuote:
      type: object
      properties:
        quote:
          type: string
        attribution:
          type: string
        role:
          type: string
      required:
        - quote
        - attribution
        - role
    CaseStudySummary:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        title:
          type: string
        dek:
          type: string
        author:
          type: string
        readingMinutes:
          type: integer
        publishedAt:
          type: string
          format: date-time
        company:
          $ref: "#/components/schemas/CaseStudyCompany"
        metrics:
          type: array
          items:
            $ref: "#/components/schemas/CaseStudyMetric"
      required:
        - id
        - slug
        - title
        - dek
        - author
        - readingMinutes
        - publishedAt
        - company
        - metrics
    CaseStudyDetail:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        title:
          type: string
        dek:
          type: string
        body:
          type: string
        author:
          type: string
        readingMinutes:
          type: integer
        publishedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        company:
          $ref: "#/components/schemas/CaseStudyCompany"
        metrics:
          type: array
          items:
            $ref: "#/components/schemas/CaseStudyMetric"
        quotes:
          type: array
          items:
            $ref: "#/components/schemas/CaseStudyQuote"
        relatedArticles:
          type: array
          items:
            $ref: "#/components/schemas/ArticleSummary"
      required:
        - id
        - slug
        - title
        - dek
        - body
        - author
        - readingMinutes
        - publishedAt
        - updatedAt
        - company
        - metrics
        - quotes
        - relatedArticles
