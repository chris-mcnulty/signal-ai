kind = "web"
previewPath = "/"
title = "SignalAI"
version = "1.0.0"
id = "artifacts/site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21238

[services.development]
run = "pnpm --filter @workspace/site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/site", "run", "build" ]

[services.production.run]
args = [ "node", "artifacts/site/server.mjs" ]

[services.production.run.env]
PORT = "21238"
NODE_ENV = "production"

[services.env]
PORT = "21238"
BASE_PATH = "/"
