<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500" role="img" aria-label="SignalAI square wordmark">
  <title>SignalAI</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&amp;display=swap');
      .signal {
        font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
        font-weight: 900;
        font-size: 110px;
        letter-spacing: -1px;
        text-anchor: middle;
        fill: #ffffff;
      }
      .ai {
        font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
        font-weight: 900;
        font-size: 160px;
        letter-spacing: -2px;
        text-anchor: middle;
        fill: #d94226;
      }
    </style>
  </defs>
  <rect width="500" height="500" rx="40" ry="40" fill="#1a1a1a"/>
  <text class="signal" x="250" y="215">Signal</text>
  <text class="ai" x="250" y="370">AI</text>
</svg>
